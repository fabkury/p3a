name: Publish firmware to GitHub Pages

on:
  release:
    types: [published]

jobs:
  copy-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download flash files from release
        env:
          TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          DIR="docs/web-flasher/firmware/${TAG}"
          mkdir -p "${DIR}"

          # Download flash_args first to know which files to fetch
          gh release download "${TAG}" --pattern "flash_args" --dir "${DIR}"

          # Download each binary listed in flash_args
          while read -r addr filename; do
            echo "Downloading ${filename}..."
            gh release download "${TAG}" --pattern "${filename}" --dir "${DIR}"
          done < "${DIR}/flash_args"

          echo "Files downloaded:"
          ls -lh "${DIR}/"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/web-flasher/firmware/
          git commit -m "Add firmware files for ${{ github.event.release.tag_name }} to web flasher"
          git push
