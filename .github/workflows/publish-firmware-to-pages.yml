name: Publish firmware to GitHub Pages

on:
  release:
    types: [published]

jobs:
  copy-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download flash files from release
        env:
          TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          DIR="docs/web-flasher/firmware/${TAG}"
          mkdir -p "${DIR}"

          # Download flash_args first to know which files to fetch
          gh release download "${TAG}" --pattern "flash_args" --dir "${DIR}"

          # Download each binary listed in flash_args
          # Skip option lines (starting with --) and strip directory prefixes
          while read -r addr filename; do
            # Skip lines that aren't address/filename pairs
            [[ "${addr}" == --* ]] && continue
            [[ -z "${filename}" ]] && continue
            # Strip directory prefix to get the bare asset name
            asset="$(basename "${filename}")"
            echo "Downloading ${asset}..."
            gh release download "${TAG}" --pattern "${asset}" --dir "${DIR}"
          done < "${DIR}/flash_args"

          # Normalize flash_args: remove option lines and strip directory prefixes
          grep '^0x' "${DIR}/flash_args" | while read -r addr path; do
            echo "${addr} $(basename "${path}")"
          done > "${DIR}/flash_args.tmp"
          mv "${DIR}/flash_args.tmp" "${DIR}/flash_args"

          echo "Files downloaded:"
          ls -lh "${DIR}/"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/web-flasher/firmware/
          git commit -m "Add firmware files for ${{ github.event.release.tag_name }} to web flasher"
          git push
