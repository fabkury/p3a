## IDF Component Manager Manifest File
dependencies:
  waveshare/esp32_p4_wifi6_touch_lcd_4b: "1.0.*"
  espressif/esp_lcd_touch: "^1.2.0"
  # libpng is a local fork (components/espressif__libpng) carrying the APNG
  # read patch - see its README.md before bumping or re-adding the registry dep.
  espressif/libjpeg-turbo: "^3.1.1"
  espressif/mdns: "^1.0.*"
  espressif/esp_hosted: "~2.9.3"  # Dual-version support - see docs/slave-ota/DUAL-VERSION-SUPPORT-PLAN.md
  # Pinned to the 2.9.x patch line: 2.10+ enlarged the SDIO RX mempool past
  # the internal-RAM budget on this sdkconfig and caused HS_MP "no mem" at
  # boot followed by an SDIO host self-reset. Loosen this once the sdkconfig
  # is updated to give esp_hosted's newer mempool the headroom it wants.
  espressif/esp_wifi_remote: "*"
  espressif/esp_tinyusb: "^1.3.0"
  espressif/tinyusb: "^0.17.0~1"
  joltwallet/littlefs: "*"