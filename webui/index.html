<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="/favicon.ico">
<script src="/static/compat.js"></script>
<link rel="stylesheet" href="/static/common.css">
<title>p3a</title>
<style>
body {
    justify-content: flex-start;
    overflow-x: hidden;
}
.header h1 {
    font-size: clamp(2rem, 4vw, 2.5rem);
}
.controls {
    flex: 0 0 auto;
    width: min(420px, 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--sp-4);
    gap: var(--sp-4);
    background: rgba(255,255,255,0.12);
    border-radius: var(--r-lg);
    box-shadow: var(--c-card-shadow);
}
.arrow-row {
    display: flex;
    gap: 18px;
    align-items: center;
    justify-content: space-between;
    width: 100%;
}
.arrow-btn {
    background: var(--c-card-bg);
    border: none;
    border-radius: 50%;
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.8rem;
    color: var(--c-primary);
    box-shadow: var(--c-card-shadow);
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
}
.arrow-btn:active { transform: scale(0.92); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
.arrow-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.pause-btn {
    background: var(--c-card-bg);
    border: none;
    border-radius: var(--r-md);
    padding: 10px 28px;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--c-primary);
    cursor: pointer;
    box-shadow: var(--c-card-shadow);
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    min-width: 110px;
}
.pause-btn:active { transform: scale(0.95); }
.playset-card {
    background: var(--c-primary);
    border-radius: var(--r-md);
    font-size: 0.8rem;
    color: white;
    box-shadow: 0 6px 16px rgba(102,126,234,0.4);
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
}
.playset-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-2) var(--sp-4);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.playset-header-text { text-align: center; flex: 1; min-width: 0; }
.playset-name {
    font-weight: 600;
    color: white;
    font-size: 0.85rem;
    margin-bottom: 2px;
}
.playset-stats {
    color: rgba(255,255,255,0.85);
    font-size: 0.75rem;
}
.playset-toggle {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.7);
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: var(--sp-2);
}
.playset-card.collapsed .playset-toggle { transform: rotate(-90deg); }
.playset-card.collapsed .playset-channels { display: none; }
.playset-channels {
    border-top: 1px solid rgba(255,255,255,0.2);
    padding: var(--sp-sm, 6px) 10px var(--sp-2);
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.ps-ch-row {
    display: flex;
    align-items: center;
    gap: var(--sp-sm, 6px);
    font-size: 0.7rem;
    padding: var(--sp-1) var(--sp-sm, 6px);
    border-radius: var(--r-sm);
    background: rgba(255,255,255,0.08);
    transition: opacity 0.3s;
}
.ps-ch-row.refreshing {
    animation: ps-pulse 1.8s ease-in-out infinite;
}
@keyframes ps-pulse {
    0%, 100% { background: rgba(255,255,255,0.08); }
    50% { background: rgba(255,255,255,0.22); }
}
.ps-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
    text-transform: uppercase;
    flex-shrink: 0;
}
.ps-badge-type { background: rgba(255,255,255,0.25); color: #fff; }
.ps-badge-sub { background: rgba(0,0,0,0.18); color: rgba(255,255,255,0.9); }
.ps-ch-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
.ps-ch-id { color: rgba(255,255,255,0.65); font-size: 0.65rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }
.ps-ch-count { white-space: nowrap; color: rgba(255,255,255,0.85); flex-shrink: 0; }
.ps-ch-time { white-space: nowrap; color: rgba(255,255,255,0.55); font-size: 0.6rem; flex-shrink: 0; }
.ps-ch-loading { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.75rem; padding: var(--sp-sm, 6px) 0; }
.channel-btn {
    background: var(--c-card-bg);
    border: none;
    border-radius: var(--r-md);
    padding: var(--sp-3) var(--sp-5);
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--c-primary);
    cursor: pointer;
    box-shadow: var(--c-card-shadow);
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
}
.channel-btn:active { transform: scale(0.95); }
.channel-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.channel-btn.selected {
    background: var(--c-primary);
    color: white;
    box-shadow: 0 6px 16px rgba(102,126,234,0.4);
}
.upload-section {
    width: min(420px, 100%);
    background: var(--c-card-bg);
    border-radius: var(--r-lg);
    padding: 14px;
    margin: 0;
    box-shadow: var(--c-card-shadow);
}
.upload-section h3 {
    margin: 0;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--c-text);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.upload-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
    padding-bottom: var(--sp-2);
}
.upload-toggle {
    font-size: 1rem;
    transition: transform 0.2s;
    color: var(--c-primary);
}
.upload-section.collapsed .upload-toggle { transform: rotate(-90deg); }
.upload-section.collapsed .upload-content { display: none; }
.upload-form { display: flex; flex-direction: column; gap: var(--sp-2); }
.drop-zone {
    border: 2px dashed var(--c-primary);
    border-radius: var(--r-md);
    padding: var(--sp-6) var(--sp-4);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f8f9ff;
}
.drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--c-success);
    background: #f0fff0;
}
.drop-zone-prompt { color: var(--c-text-light); font-size: 0.85rem; }
.drop-icon { display: block; font-size: 2rem; margin-bottom: var(--sp-2); }
.drop-zone input[type=file] { display: none; }
.file-info {
    font-size: 0.8rem;
    color: var(--c-text);
    background: var(--c-bg-subtle);
    padding: var(--sp-2) var(--sp-3);
    border-radius: var(--r-md);
    margin-top: var(--sp-2);
    display: none;
    word-break: break-word;
}
.file-info.has-file { display: block; }
.upload-btn {
    background: var(--c-success);
    color: white;
    border: none;
    padding: 9px;
    border-radius: var(--r-md);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
}
.upload-btn:active:not(:disabled) { background: var(--c-success-dark); }
.upload-btn:disabled { background: #ccc; cursor: not-allowed; }
.show-url-row {
    display: flex;
    gap: var(--sp-2);
    margin-top: var(--sp-1);
}
.show-url-input {
    flex: 1;
    padding: var(--sp-2) 10px;
    border: 1.5px solid #d0d0d0;
    border-radius: var(--r-md);
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
}
.show-url-input:focus { border-color: var(--c-primary); }
.show-url-input::placeholder { color: #aaa; }
.show-url-btn {
    background: var(--c-primary);
    color: white;
    border: none;
    padding: var(--sp-2) var(--sp-4);
    border-radius: var(--r-md);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
}
.show-url-btn:active:not(:disabled) { background: var(--c-primary-dark); }
.show-url-btn:disabled { background: #ccc; cursor: not-allowed; }
.upload-progress { display: none; margin-top: var(--sp-sm, 6px); }
.upload-progress.active { display: block; }
.progress-fill { background: var(--c-success); }
@media (max-width: 480px) {
    .header h1 { font-size: 1.9rem; }
    .controls { padding: 14px; }
    .arrow-btn { width: 64px; height: 64px; font-size: 1.6rem; }
    .arrow-row { gap: 16px; }
    .pause-btn { padding: 9px 20px; font-size: 0.85rem; }
}
@media (max-height: 640px) {
    .header h1 { font-size: 1.75rem; letter-spacing: 0.08em; }
    .controls { padding: 12px; gap: 12px; }
    .arrow-btn { width: 60px; height: 60px; font-size: 1.5rem; }
    .pause-btn { padding: 8px 18px; font-size: 0.82rem; }
    .upload-section { padding: 12px; }
    .footer { padding-top: 4px; }
}
@media (min-width: 481px) {
    .arrow-btn:hover { transform: scale(1.05); }
    .pause-btn:hover { transform: scale(1.02); }
}
.update-banner {
    display: none;
    width: min(420px, 100%);
    background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
    border-radius: var(--r-md);
    padding: var(--sp-3) var(--sp-4);
    color: white;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(0,200,83,0.3);
}
.update-banner:active { transform: scale(0.98); }
.update-banner h4 { margin: 0 0 4px; font-size: 0.95rem; font-weight: 600; }
.update-banner p { margin: 0; font-size: 0.8rem; opacity: 0.9; }
.toggle-slider {
    background-color: rgba(255,255,255,0.3);
}
.toggle-switch input:checked + .toggle-slider { background-color: rgba(255,255,255,0.9); }
.toggle-switch input:checked + .toggle-slider:before { background-color: var(--c-primary); }
.artwork-area {
    width: min(420px, 100%);
    aspect-ratio: 1 / 1;
    background: rgba(255,255,255,0.12);
    border-radius: var(--r-lg);
    box-shadow: var(--c-card-shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.artwork-area img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
.artwork-area img.pixelated {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
}
</style>
</head>
<body>
<div class="header">
    <h1>p3a</h1>
</div>
<div class="artwork-area" id="artwork-area">
    <img id="artwork-img" style="display:none;">
</div>
<div class="controls">
    <div class="arrow-row">
        <button class="arrow-btn" id="back-btn" onclick="sendCommand('swap_back')">&#9664;</button>
        <button class="pause-btn" id="pause-btn" onclick="togglePause()">Pause</button>
        <button class="arrow-btn" id="next-btn" onclick="sendCommand('swap_next')">&#9654;</button>
    </div>
    <div class="playset-card collapsed" id="playset-card" style="display:none;">
        <div class="playset-header" onclick="togglePlaysetCard()">
            <div class="playset-header-text">
                <div class="playset-name" id="playset-name"></div>
                <div class="playset-stats" id="playset-stats"></div>
            </div>
            <span class="playset-toggle" id="playset-toggle">&#9660;</span>
        </div>
        <div class="playset-channels" id="playset-channels"></div>
    </div>
</div>
<div class="controls" style="margin-top: 0;">
    <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
        <button class="channel-btn" id="ch-channel_recent" onclick="playPlayset('channel_recent')">Recent Artworks</button>
        <button class="channel-btn" id="ch-channel_promoted" onclick="playPlayset('channel_promoted')">Promoted</button>
        <button class="channel-btn" id="ch-followed_artists" onclick="playPlayset('followed_artists')">Followed Artists</button>
        <button class="channel-btn" id="ch-channel_sdcard" onclick="playPlayset('channel_sdcard')">SD Card</button>
        <button class="channel-btn" id="ch-giphy_trending" onclick="playPlayset('giphy_trending')">Giphy Trending</button>
    </div>
</div>
<div class="upload-section collapsed">
    <div class="upload-header" onclick="toggleUploadPanel()">
        <h3>Upload</h3>
        <span class="upload-toggle">&#9660;</span>
    </div>
    <div class="upload-content">
        <form class="upload-form" id="upload-form" enctype="multipart/form-data">
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-prompt">
                    <span class="drop-icon">&#128193;</span>
                    <span>Drop file here or click to browse</span>
                </div>
                <input type="file" id="file-input" name="file" accept=".webp,.gif,.jpg,.jpeg,.png,image/webp,image/gif,image/jpeg,image/png" required>
            </div>
            <div class="file-info" id="file-info"></div>
            <button type="submit" class="upload-btn" id="upload-btn">Upload</button>
            <div class="upload-progress" id="upload-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </form>
        <div class="show-url-row">
            <input type="url" class="show-url-input" id="show-url-input" placeholder="https://example.com/artwork.gif">
            <button type="button" class="show-url-btn" id="show-url-btn">Show</button>
        </div>
    </div>
</div>
<div class="update-banner" id="update-banner" onclick="window.location.href='/ota'">
    <h4>&#x2B06; Update Available</h4>
    <p id="update-version">A new firmware version is ready to install</p>
</div>
<div class="footer">
    <button class="footer-btn" onclick="window.location.href='/config/network'">Network</button>
    <button class="footer-btn" id="pico8-btn" onclick="window.location.href='/pico8'">PICO-8</button>
    <button class="footer-btn" onclick="window.location.href='/settings'">Settings</button>
    <button class="footer-btn" onclick="window.location.href='/giphy'">Giphy</button>
    <button class="footer-btn" onclick="window.location.href='/playset-editor'">Playsets</button>
    <button class="footer-btn" onclick="window.location.href='/ota'">Update</button>
</div>
<div class="status" id="status"></div>
<script>
var isPaused = false;
var LCD_MAX_WIDTH = 720;
var LCD_MAX_HEIGHT = 720;

function updateArtwork(currentArtwork) {
    var img = document.getElementById('artwork-img');
    if (!currentArtwork || !currentArtwork.url) {
        img.style.display = 'none';
        return;
    }
    var usePixelated = (currentArtwork.channel_type !== 'giphy');
    if (usePixelated) {
        img.classList.add('pixelated');
    } else {
        img.classList.remove('pixelated');
    }
    if (img.getAttribute('data-url') !== currentArtwork.url) {
        img.src = currentArtwork.url;
        img.setAttribute('data-url', currentArtwork.url);
    }
    img.style.display = '';
}

// Load all init data from device in a single request
fetch('/api/init').then(function(r) { return r.json(); }).then(function(d) {
    if (!d.ok || !d.data) return;
    var data = d.data;
    // UI config
    if (data.ui_config) {
        LCD_MAX_WIDTH = data.ui_config.lcd_width || 720;
        LCD_MAX_HEIGHT = data.ui_config.lcd_height || 720;
        if (!data.ui_config.pico8_enabled) {
            document.getElementById('pico8-btn').style.display = 'none';
        }
    }
    // Channel stats
    if (data.channel_stats) {
        var registered = data.channel_stats.registered === true;
        var recentBtn = document.getElementById('ch-channel_recent');
        var promBtn = document.getElementById('ch-channel_promoted');
        var followedBtn = document.getElementById('ch-followed_artists');
        if (recentBtn) recentBtn.disabled = !registered;
        if (followedBtn) followedBtn.disabled = !registered;
    }
    // Active playset
    if (data.active_playset) {
        updateSelectedChannel(data.active_playset);
    }
    // Playset info card
    if (data.active_playset && data.playset_info) {
        updatePlaysetInfo(data.active_playset, data.playset_info);
    }
    // Pause state
    if (data.paused) {
        isPaused = true;
        document.getElementById('pause-btn').textContent = 'Resume';
    }
    // Current artwork
    updateArtwork(data.current_artwork);
}).catch(function(e) { console.log('Init fetch failed:', e); });

function showToast(msg, isError) {
    var status = document.getElementById('status');
    status.textContent = msg;
    status.className = isError ? 'status error' : 'status success';
    status.style.display = 'block';
    setTimeout(function() { status.style.display = 'none'; }, 6000);
}
function togglePause() {
    var action = isPaused ? 'resume' : 'pause';
    var status = document.getElementById('status');
    var pauseBtn = document.getElementById('pause-btn');
    pauseBtn.disabled = true;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/action/' + action, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            var pauseBtn = document.getElementById('pause-btn');
            try {
                var result = JSON.parse(xhr.responseText);
                if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                    isPaused = !isPaused;
                    pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
                    status.textContent = isPaused ? 'Paused' : 'Resumed';
                    status.className = 'status success';
                } else {
                    status.textContent = 'Command failed: ' + (result.error || 'HTTP ' + xhr.status);
                    status.className = 'status error';
                }
            } catch (e) {
                status.textContent = 'Parse error: ' + e.message;
                status.className = 'status error';
            }
            status.style.display = 'block';
            setTimeout(function() { status.style.display = 'none'; }, 6000);
            pauseBtn.disabled = false;
        }
    };
    xhr.send('{}');
}
function sendCommand(action) {
    console.log('Sending command:', action);
    var status = document.getElementById('status');
    var backBtn = document.getElementById('back-btn');
    var nextBtn = document.getElementById('next-btn');
    backBtn.disabled = true;
    nextBtn.disabled = true;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/action/' + action, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            try {
                var result = JSON.parse(xhr.responseText);
                if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                    // Success: no message shown
                } else {
                    status.textContent = 'Command failed: ' + (result.error || 'HTTP ' + xhr.status);
                    status.className = 'status error';
                    status.style.display = 'block';
                    setTimeout(function() { status.style.display = 'none'; }, 6000);
                }
            } catch (e) {
                status.textContent = 'Parse error: ' + e.message;
                status.className = 'status error';
                status.style.display = 'block';
                setTimeout(function() { status.style.display = 'none'; }, 6000);
            }
            backBtn.disabled = false;
            nextBtn.disabled = false;
        }
    };
    xhr.send('{}');
    if (action === 'swap_next' || action === 'swap_back') {
        schedulePollAfterSwap();
    }
}
// switchChannel() is deprecated - all buttons now use playPlayset()
// Keeping for backwards compatibility with external scripts
function switchChannel(channel) {
    // Map legacy channel names to playset names
    var playset = channel;
    if (channel === 'all') playset = 'channel_recent';
    else if (channel === 'promoted') playset = 'channel_promoted';
    else if (channel === 'sdcard') playset = 'channel_sdcard';
    playPlayset(playset);
}
function playPlayset(name) {
    console.log('Playing playset:', name);
    var status = document.getElementById('status');
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/playset/' + name, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            try {
                var result = JSON.parse(xhr.responseText);
                if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                    // Map playset names to friendly display names
                    var displayName = name;
                    if (name === 'channel_recent') displayName = 'Recent Artworks';
                    else if (name === 'channel_promoted') displayName = 'Promoted';
                    else if (name === 'channel_sdcard') displayName = 'SD Card';
                    else if (name === 'followed_artists') displayName = 'Followed Artists';
                    else if (name === 'giphy_trending') displayName = 'Giphy Trending';
                    status.textContent = 'Switched to ' + displayName;
                    status.className = 'status success';
                    updateSelectedChannel(name);
                    updatePlaysetInfo(name, {
                        channel_count: result.channel_count,
                        total_cached: result.total_cached,
                        total_entries: result.total_entries,
                        exposure_mode: result.exposure_mode,
                        pick_mode: result.pick_mode
                    });
                } else {
                    status.textContent = result.error || 'Failed to load playset';
                    status.className = 'status error';
                }
            } catch (e) {
                status.textContent = 'Parse error: ' + e.message;
                status.className = 'status error';
            }
            status.style.display = 'block';
            setTimeout(function() { status.style.display = 'none'; }, 6000);
        }
    };
    xhr.send('{}');
}
var fileInput = document.getElementById('file-input');
var fileInfo = document.getElementById('file-info');
var uploadForm = document.getElementById('upload-form');
var uploadBtn = document.getElementById('upload-btn');
var uploadProgress = document.getElementById('upload-progress');
var progressFill = document.getElementById('progress-fill');
var statusDiv = document.getElementById('status');
var dropZone = document.getElementById('drop-zone');

function toggleUploadPanel() {
    var section = document.querySelector('.upload-section');
    section.classList.toggle('collapsed');
}

// Show URL handler
var showUrlInput = document.getElementById('show-url-input');
var showUrlBtn = document.getElementById('show-url-btn');
showUrlBtn.addEventListener('click', function() {
    var url = showUrlInput.value.trim();
    if (!url) {
        statusDiv.textContent = 'Please enter a URL';
        statusDiv.className = 'status error';
        statusDiv.style.display = 'block';
        setTimeout(function() { statusDiv.style.display = 'none'; }, 4000);
        return;
    }
    showUrlBtn.disabled = true;
    statusDiv.textContent = 'Sending...';
    statusDiv.className = 'status';
    statusDiv.style.display = 'block';
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/action/show_url', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            showUrlBtn.disabled = false;
            try {
                var result = JSON.parse(xhr.responseText);
                if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                    statusDiv.textContent = 'Download started';
                    statusDiv.className = 'status success';
                    showUrlInput.value = '';
                } else {
                    statusDiv.textContent = 'Failed: ' + (result.error || 'HTTP ' + xhr.status);
                    statusDiv.className = 'status error';
                }
            } catch (e) {
                statusDiv.textContent = 'Failed: ' + xhr.statusText;
                statusDiv.className = 'status error';
            }
            statusDiv.style.display = 'block';
            setTimeout(function() { statusDiv.style.display = 'none'; }, 6000);
        }
    };
    xhr.send(JSON.stringify({ artwork_url: url }));
});
showUrlInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        showUrlBtn.click();
    }
});

// Drag and drop handlers
dropZone.addEventListener('click', function(e) {
    if (e.target !== fileInput) fileInput.click();
});
dropZone.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
});
dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
    }
});

function isJpegFile(file) {
    var name = file.name.toLowerCase();
    return name.endsWith('.jpg') || name.endsWith('.jpeg') || file.type === 'image/jpeg';
}
function getImageDimensions(file) {
    return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onerror = function() { reject(new Error('Failed to read file.')); };
        reader.onload = function() {
            var img = new Image();
            img.onload = function() { resolve({ width: img.width, height: img.height }); };
            img.onerror = function() { reject(new Error('Failed to load image.')); };
            img.src = reader.result;
        };
        reader.readAsDataURL(file);
    });
}
function resizeAndConvertToPng(file, maxW, maxH) {
    return new Promise(function(resolve, reject) {
        if (!file.type.startsWith('image/')) {
            reject(new Error('Selected file is not an image.'));
            return;
        }
        var reader = new FileReader();
        reader.onerror = function() { reject(new Error('Failed to read file.')); };
        reader.onload = function() {
            var img = new Image();
            img.onload = function() {
                try {
                    var width = img.width;
                    var height = img.height;
                    var scale = Math.min(maxW / width, maxH / height, 1);
                    var newW = Math.round(width * scale);
                    var newH = Math.round(height * scale);
                    var canvas = document.createElement('canvas');
                    canvas.width = newW;
                    canvas.height = newH;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, newW, newH);
                    canvas.toBlob(function(blob) {
                        if (!blob) {
                            reject(new Error('Canvas conversion to PNG failed.'));
                        } else {
                            resolve(blob);
                        }
                    }, 'image/png', 1.0);
                } catch (e) {
                    reject(e);
                }
            };
            img.onerror = function() { reject(new Error('Failed to load image.')); };
            img.src = reader.result;
        };
        reader.readAsDataURL(file);
    });
}
fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (file) {
        var maxSize = isJpegFile(file) ? 25 * 1024 * 1024 : 5 * 1024 * 1024;
        var maxSizeMB = isJpegFile(file) ? '25MB' : '5MB';
        if (file.size > maxSize) {
            fileInfo.innerHTML = '<strong style="color:#f44336">File too large!</strong> Maximum size is ' + maxSizeMB + '.';
            fileInfo.classList.add('has-file');
            uploadBtn.disabled = true;
            fileInput.value = '';
        } else {
            var sizeStr = file.size < 1024 ? file.size + ' B' :
                          file.size < 1048576 ? (file.size / 1024).toFixed(1) + ' KB' :
                          (file.size / 1048576).toFixed(2) + ' MB';
            var typeStr = file.type || 'unknown';
            fileInfo.innerHTML = '<strong>' + file.name + '</strong><br>' + sizeStr + ' &bull; ' + typeStr;
            fileInfo.classList.add('has-file');
            uploadBtn.disabled = false;
        }
    } else {
        fileInfo.innerHTML = '';
        fileInfo.classList.remove('has-file');
        uploadBtn.disabled = false;
    }
});
uploadForm.addEventListener('submit', function(e) {
    e.preventDefault();
    var file = fileInput.files[0];
    if (!file) {
        statusDiv.textContent = 'Please select a file';
        statusDiv.className = 'status error';
        statusDiv.style.display = 'block';
        setTimeout(function() { statusDiv.style.display = 'none'; }, 6000);
        return;
    }
    var maxSize = isJpegFile(file) ? 25 * 1024 * 1024 : 5 * 1024 * 1024;
    var maxSizeMB = isJpegFile(file) ? '25MB' : '5MB';
    if (file.size > maxSize) {
        statusDiv.textContent = 'File too large! Maximum size is ' + maxSizeMB + '.';
        statusDiv.className = 'status error';
        statusDiv.style.display = 'block';
        setTimeout(function() { statusDiv.style.display = 'none'; }, 6000);
        return;
    }
    uploadBtn.disabled = true;
    statusDiv.textContent = 'Processing...';
    statusDiv.className = 'status';
    statusDiv.style.display = 'block';
    var processAndUpload = function(fileToUpload, filename) {
        var formData = new FormData();
        formData.append('file', fileToUpload, filename);
        uploadProgress.classList.add('active');
        progressFill.style.width = '0%';
        statusDiv.textContent = 'Uploading...';
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload', true);
        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                var percentComplete = (e.loaded / e.total) * 100;
                progressFill.style.width = percentComplete + '%';
            }
        };
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                uploadBtn.disabled = false;
                uploadProgress.classList.remove('active');
                progressFill.style.width = '0%';
                try {
                    var result = JSON.parse(xhr.responseText);
                    if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                        statusDiv.textContent = 'Upload successful!';
                        statusDiv.className = 'status success';
                        fileInput.value = '';
                        fileInfo.innerHTML = '';
                        fileInfo.classList.remove('has-file');
                    } else {
                        statusDiv.textContent = 'Upload failed: ' + (result.error || 'HTTP ' + xhr.status);
                        statusDiv.className = 'status error';
                    }
                } catch (e) {
                    statusDiv.textContent = 'Upload failed: ' + xhr.statusText;
                    statusDiv.className = 'status error';
                }
                statusDiv.style.display = 'block';
                setTimeout(function() { statusDiv.style.display = 'none'; }, 5000);
            }
        };
        xhr.send(formData);
    };
    if (isJpegFile(file)) {
        getImageDimensions(file).then(function(dims) {
            if (dims.width > LCD_MAX_WIDTH || dims.height > LCD_MAX_HEIGHT) {
                return resizeAndConvertToPng(file, LCD_MAX_WIDTH, LCD_MAX_HEIGHT).then(function(pngBlob) {
                    var pngFileName = file.name.replace(/\.[^/.]+$/, '.png');
                    processAndUpload(pngBlob, pngFileName);
                });
            } else {
                processAndUpload(file, file.name);
            }
        }).catch(function(err) {
            uploadBtn.disabled = false;
            statusDiv.textContent = 'Error processing image: ' + err.message;
            statusDiv.className = 'status error';
            statusDiv.style.display = 'block';
            setTimeout(function() { statusDiv.style.display = 'none'; }, 5000);
        });
    } else {
        processAndUpload(file, file.name);
    }
});
function checkForUpdates() {
    fetch('/ota/status').then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok && d.data.state === 'update_available') {
            var banner = document.getElementById('update-banner');
            var verText = document.getElementById('update-version');
            verText.textContent = 'v' + d.data.current_version + ' -> v' + d.data.available_version;
            banner.style.display = 'block';
        }
    }).catch(function(e) { console.log('Update check failed:', e); });
}
function pollActivePlayset(attempt) {
    attempt = attempt || 0;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/playsets/active', true);
    xhr.timeout = 5000;
    function retry() {
        if (attempt < 2) {
            setTimeout(function() { pollActivePlayset(attempt + 1); }, 500);
        }
    }
    xhr.onerror = retry;
    xhr.ontimeout = retry;
    xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status !== 200) { retry(); return; }
        try {
            var resp = JSON.parse(xhr.responseText);
            if (resp.ok && resp.data) {
                var registered = resp.data.registered === true;
                var recentBtn = document.getElementById('ch-channel_recent');
                var promBtn = document.getElementById('ch-channel_promoted');
                var followedBtn = document.getElementById('ch-followed_artists');
                if (recentBtn) recentBtn.disabled = !registered;
                if (followedBtn) followedBtn.disabled = !registered;
                if (resp.data.name && resp.data.playset_info) {
                    updatePlaysetInfo(resp.data.name, resp.data.playset_info);
                    updateSelectedChannel(resp.data.name);
                }
                updateArtwork(resp.data.current_artwork);
            }
        } catch (e) { console.log('Playset poll parse error:', e); retry(); }
    };
    xhr.send();
}
function playsetDisplayName(name) {
    if (name === 'channel_recent') return 'Recent Artworks';
    if (name === 'channel_promoted') return 'Promoted';
    if (name === 'channel_sdcard') return 'SD Card';
    if (name === 'followed_artists') return 'Followed Artists';
    if (name === 'giphy_trending') return 'Giphy Trending';
    return name;
}
function togglePlaysetCard() {
    var card = document.getElementById('playset-card');
    var wasCollapsed = card.classList.contains('collapsed');
    card.classList.toggle('collapsed');
    if (wasCollapsed) {
        var container = document.getElementById('playset-channels');
        if (!container.querySelector('.ps-ch-row')) {
            container.innerHTML = '<div class="ps-ch-loading">Loading\u2026</div>';
        }
        pollActivePlayset();
    }
}
function typeBadgeLetter(type) {
    var m = {named:'N',user:'U',hashtag:'H',sdcard:'S',giphy:'G',artwork:'A'};
    return m[type] || '?';
}
function subTypeBadge(name) {
    if (!name) return '';
    var m = {all:'AL',promoted:'PR',trending:'TR',search:'SE',sdcard:'SD',user:'US',hashtag:'HT',artwork:'AW'};
    return m[name] || name.substring(0,2).toUpperCase();
}
function relativeTime(epoch) {
    if (!epoch) return 'never';
    var now = Math.floor(Date.now() / 1000);
    var d = now - epoch;
    if (d < 0) return 'now';
    if (d < 60) return d + 's ago';
    if (d < 3600) return Math.floor(d / 60) + 'm ago';
    if (d < 86400) return Math.floor(d / 3600) + 'h ago';
    return Math.floor(d / 86400) + 'd ago';
}
function escHtml(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
}
function createChannelRow(ch) {
    var row = document.createElement('div');
    row.className = 'ps-ch-row';
    if (ch.refreshing) row.classList.add('refreshing');
    var s = '<span class="ps-badge ps-badge-type">' + typeBadgeLetter(ch.type) + '</span>';
    s += '<span class="ps-badge ps-badge-sub">' + subTypeBadge(ch.name) + '</span>';
    s += '<span class="ps-ch-name">' + escHtml(ch.display_name || ch.channel_id || '') + '</span>';
    if (ch.identifier) s += '<span class="ps-ch-id">' + escHtml(ch.identifier) + '</span>';
    s += '<span class="ps-ch-count">' + (ch.available || 0) + '/' + (ch.total || 0) + '</span>';
    s += '<span class="ps-ch-time">' + relativeTime(ch.last_refresh) + '</span>';
    row.innerHTML = s;
    return row;
}
function updateChannelRow(row, ch) {
    if (ch.refreshing) row.classList.add('refreshing');
    else row.classList.remove('refreshing');
    row.querySelector('.ps-badge-type').textContent = typeBadgeLetter(ch.type);
    row.querySelector('.ps-badge-sub').textContent = subTypeBadge(ch.name);
    row.querySelector('.ps-ch-name').textContent = ch.display_name || ch.channel_id || '';
    var idSpan = row.querySelector('.ps-ch-id');
    if (ch.identifier) {
        if (!idSpan) {
            idSpan = document.createElement('span');
            idSpan.className = 'ps-ch-id';
            row.insertBefore(idSpan, row.querySelector('.ps-ch-count'));
        }
        idSpan.textContent = ch.identifier;
    } else if (idSpan) {
        idSpan.remove();
    }
    row.querySelector('.ps-ch-count').textContent = (ch.available || 0) + '/' + (ch.total || 0);
    row.querySelector('.ps-ch-time').textContent = relativeTime(ch.last_refresh);
}
function renderChannelRows(channels) {
    var container = document.getElementById('playset-channels');
    if (!channels || !channels.length) { container.innerHTML = ''; return; }
    // Clear loading indicator or any non-channel-row content
    if (container.firstElementChild && !container.firstElementChild.classList.contains('ps-ch-row')) {
        container.innerHTML = '';
    }
    var existing = container.children;
    for (var i = 0; i < channels.length; i++) {
        if (i < existing.length) {
            updateChannelRow(existing[i], channels[i]);
        } else {
            container.appendChild(createChannelRow(channels[i]));
        }
    }
    while (container.children.length > channels.length) {
        container.removeChild(container.lastChild);
    }
}
function updatePlaysetInfo(name, info) {
    var card = document.getElementById('playset-card');
    if (!info) { card.style.display = 'none'; return; }
    var nameEl = document.getElementById('playset-name');
    var statsEl = document.getElementById('playset-stats');
    nameEl.textContent = playsetDisplayName(name);
    var parts = [];
    if (typeof info.channel_count === 'number') parts.push(info.channel_count + ' ch');
    if (typeof info.total_cached === 'number' && typeof info.total_entries === 'number')
        parts.push(info.total_cached + '/' + info.total_entries + ' artworks');
    var modes = [];
    if (info.exposure_mode) modes.push(info.exposure_mode.charAt(0).toUpperCase() + info.exposure_mode.slice(1));
    if (info.pick_mode) modes.push(info.pick_mode.charAt(0).toUpperCase() + info.pick_mode.slice(1));
    if (modes.length) parts.push(modes.join(' \u00b7 '));
    statsEl.textContent = parts.join(' \u00b7 ');
    card.style.display = '';
    if (info.channels) renderChannelRows(info.channels);
}
function updateSelectedChannel(playsetOrChannel) {
    var buttons = document.querySelectorAll('.channel-btn');
    buttons.forEach(function(btn) { btn.classList.remove('selected'); });

    // Map legacy channel names to playset names for backwards compatibility
    var playset = playsetOrChannel;
    if (playsetOrChannel === 'all') playset = 'channel_recent';
    else if (playsetOrChannel === 'promoted') playset = 'channel_promoted';
    else if (playsetOrChannel === 'sdcard') playset = 'channel_sdcard';

    // Find button by playset name
    var btn = document.getElementById('ch-' + playset);
    if (btn) btn.classList.add('selected');
}
function loadCurrentChannel() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/channel', true);
    xhr.timeout = 5000;
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var resp = JSON.parse(xhr.responseText);
                if (resp.ok && resp.data) {
                    // Prefer playset name, fall back to channel_name for backwards compatibility
                    var selected = resp.data.playset || resp.data.channel_name;
                    if (selected) {
                        updateSelectedChannel(selected);
                    }
                }
            } catch (e) {
                console.log('Failed to parse channel response:', e);
            }
        }
    };
    xhr.send();
}
checkForUpdates();
var pollIntervalId = setInterval(pollActivePlayset, 4000);
function schedulePollAfterSwap() {
    clearInterval(pollIntervalId);
    setTimeout(function() {
        pollActivePlayset();
        pollIntervalId = setInterval(pollActivePlayset, 4000);
    }, 750);
}
</script>
