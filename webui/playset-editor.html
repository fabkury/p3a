<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="p3a">
    <meta name="theme-color" content="#667eea">
    <script src="/static/compat.js"></script>
    <title>p3a - Playset Editor</title>
    <link rel="stylesheet" href="/static/common.css">
    <script src="/static/theme.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            padding: var(--sp-5);
            color: var(--c-text);
        }

        .container {
            width: min(var(--w-content), 100%);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--sp-5);
        }

        h1, h2, h3 {
            font-weight: 300;
            color: var(--c-on-bg);
            margin-bottom: var(--sp-3);
        }

        h1 {
            font-size: clamp(24px, 6vw, 32px);
        }

        h2 {
            font-size: clamp(20px, 5vw, 24px);
        }

        h3 {
            font-size: clamp(16px, 4vw, 18px);
            color: var(--c-text);
        }

        .card {
            background: var(--c-card-bg);
            border-radius: var(--r-lg);
            padding: var(--sp-6);
            box-shadow: var(--c-card-shadow);
        }

        .btn {
            padding: var(--sp-3) var(--sp-6);
            border: none;
            border-radius: var(--r-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: var(--sp-2);
            justify-content: center;
        }

        .btn-primary {
            background: var(--c-gradient);
            color: var(--c-on-primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px color-mix(in srgb, var(--c-primary) 40%, transparent);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--c-surface-sunk);
            color: var(--c-text);
        }

        .btn-secondary:hover {
            background: var(--c-card-border);
        }

        .btn-danger {
            background: var(--c-danger);
            color: var(--c-on-danger);
            padding: var(--sp-2) var(--sp-4);
            font-size: 12px;
            border-radius: var(--r-sm);
        }

        .btn-danger:hover {
            background: var(--c-danger-dark);
        }

        .btn-small {
            padding: var(--sp-2) var(--sp-4);
            font-size: 12px;
            border-radius: var(--r-sm);
        }

        .add-channel-btn {
            display: block;
            margin: var(--sp-3) auto 0;
        }

        .btn-icon {
            padding: var(--sp-2);
            border-radius: var(--r-sm);
            background: transparent;
            border: 1px solid var(--c-border);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--c-bg-subtle);
        }

        .playset-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
        }

        .playset-item {
            padding: var(--sp-4);
            border: 2px solid var(--c-card-border);
            border-radius: var(--r-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--sp-3);
            transition: all 0.2s;
        }

        .playset-item:hover {
            background: var(--c-surface-sunk);
            border-color: var(--c-primary);
        }

        .playset-item.active-playset {
            border-color: var(--c-success);
            background: var(--c-surface-sunk);
        }

        .playset-item.pending {
            border-color: var(--c-primary);
            background: color-mix(in srgb, var(--c-primary) 10%, transparent);
            animation: pe-pending-pulse 1.1s ease-in-out infinite;
            cursor: progress;
        }

        .btn.pending {
            animation: pe-pending-pulse 1.1s ease-in-out infinite;
            cursor: progress;
            pointer-events: none;
        }

        @keyframes pe-pending-pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .playset-info {
            flex: 1;
        }

        .playset-name {
            font-weight: 500;
            font-size: 16px;
            margin-bottom: var(--sp-1);
            display: flex;
            align-items: center;
            gap: var(--sp-2);
        }

        .now-playing-badge {
            display: inline-block;
            padding: 2px var(--sp-2);
            border-radius: var(--r-md);
            font-size: 10px;
            font-weight: 600;
            background: var(--c-success);
            color: var(--c-on-success);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .playset-meta {
            font-size: 12px;
            color: var(--c-text-light);
        }

        .playset-actions {
            display: flex;
            gap: var(--sp-2);
        }

        .form-group {
            margin-bottom: var(--sp-5);
        }

        .form-label {
            display: block;
            margin-bottom: var(--sp-2);
            font-weight: 500;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: var(--sp-3);
            border: 1px solid var(--c-border);
            border-radius: var(--r-sm);
            font-size: 14px;
            font-family: var(--font);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--c-primary);
            box-shadow: var(--focus-ring);
        }

        input.form-input:read-only {
            background: var(--c-bg-subtle);
            cursor: not-allowed;
        }

        .form-input.error {
            border-color: var(--c-danger);
        }

        .sqid-input-row {
            display: flex;
            gap: var(--sp-2);
            align-items: stretch;
        }
        .sqid-input-row .form-input {
            flex: 1;
        }
        .check-results {
            margin-top: var(--sp-1);
            padding: var(--sp-2) var(--sp-3);
            font-size: 12px;
            color: var(--c-card-fg-faint);
            background: var(--c-surface-sunk);
            border-radius: var(--r-sm);
            min-height: 24px;
        }
        .check-results.has-data {
            color: var(--c-text);
            display: flex;
            align-items: center;
            gap: var(--sp-3);
        }
        .check-results .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: -moz-crisp-edges;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
            flex-shrink: 0;
        }
        .check-results .user-info {
            font-size: 12px;
            line-height: 1.4;
        }

        .error-message {
            color: var(--c-danger);
            font-size: 12px;
            margin-top: var(--sp-1);
        }

        .radio-group {
            display: flex;
            gap: var(--sp-3);
            flex-wrap: wrap;
        }

        .radio-option {
            flex: 1;
            min-width: 120px;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .radio-label {
            display: block;
            padding: var(--sp-3);
            border: 2px solid var(--c-border);
            border-radius: var(--r-sm);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            border-color: var(--c-primary);
            background: color-mix(in srgb, var(--c-primary) 10%, transparent);
            font-weight: 500;
        }

        .radio-label:hover {
            border-color: var(--c-primary);
        }

        .mode-description {
            margin-top: var(--sp-2);
            padding: var(--sp-3);
            background: var(--c-surface-sunk);
            border-radius: var(--r-sm);
            font-size: 13px;
            color: var(--c-text-light);
        }

        .channel-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
            margin-bottom: var(--sp-4);
        }

        .channel-card {
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            padding: var(--sp-4);
            background: var(--c-surface-sunk);
            transition: all 0.2s;
        }

        .channel-card.dragging {
            opacity: 0.5;
        }

        .channel-card.drag-over {
            border-color: var(--c-primary);
            background: color-mix(in srgb, var(--c-primary) 5%, transparent);
        }

        .channel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-3);
        }

        .channel-type-badge {
            display: inline-block;
            padding: var(--sp-1) var(--sp-3);
            border-radius: var(--r-md);
            font-size: 12px;
            font-weight: 500;
            background: var(--c-primary);
            color: var(--c-on-primary);
        }

        .channel-controls {
            display: flex;
            gap: var(--sp-2);
        }

        .channel-color-swatch {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: var(--sp-2);
            vertical-align: middle;
            flex-shrink: 0;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .channel-header-left {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .channel-fields {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
        }

        .field-row {
            display: flex;
            gap: var(--sp-3);
            align-items: flex-start;
        }

        .field-row > * {
            flex: 1;
        }

        .field-row .form-input {
            margin-bottom: 0;
        }

        .weight-viz-container {
            margin-bottom: var(--sp-5);
        }

        .weight-viz {
            display: flex;
            height: 40px;
            border-radius: var(--r-sm);
            overflow: hidden;
            margin-top: var(--sp-2);
        }

        .weight-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .weight-bar:hover {
            filter: brightness(1.1);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: var(--sp-5);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--c-card-bg);
            border-radius: var(--r-lg);
            padding: var(--sp-6);
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-5);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 500;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--c-text-light);
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--r-sm);
        }

        .close-btn:hover {
            background: var(--c-surface-sunk);
        }

        .empty-state {
            text-align: center;
            padding: 40px var(--sp-5);
            color: var(--c-text-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: var(--sp-4);
        }

        .button-group {
            display: flex;
            gap: var(--sp-3);
            margin-top: var(--sp-6);
        }

        .button-group .btn {
            flex: 1;
        }

        @media (max-width: 480px) {
            body {
                padding: var(--sp-3);
            }

            .card {
                padding: var(--sp-4);
            }

            .radio-group {
                flex-direction: column;
            }

            .radio-option {
                min-width: 100%;
            }

            .playset-item {
                flex-direction: column;
                align-items: stretch;
            }

            .playset-actions {
                justify-content: stretch;
            }

            .playset-actions .btn {
                flex: 1;
            }

            .button-group {
                flex-direction: column;
            }

            .field-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="container">
        <!-- Playset List View -->
        <div id="listView">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: var(--c-card-fg); margin: 0;">My Playsets</h2>
                    <button class="btn btn-primary btn-small" id="createNewBtn" onclick="showEditor()">+ Create New</button>
                </div>
                <div id="playsetList" class="playset-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">&#9203;</div>
                        <p>Loading playsets...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Editor View -->
        <div id="editorView" class="hidden">
            <div class="card">
                <h2 style="color: var(--c-card-fg);">Playset Configuration</h2>

                <form id="playsetForm">
                    <!-- Playset Name -->
                    <div class="form-group">
                        <label class="form-label">Playset Name</label>
                        <input type="text" id="playsetName" class="form-input" maxlength="32"
                               pattern="[a-zA-Z0-9_]+" placeholder="my_awesome_mix" required>
                        <div class="error-message hidden" id="nameError"></div>
                    </div>

                    <!-- Selection mode (recency/random) is a global device
                         setting now — toggle it via the "Shuffle" button on
                         the landing page's Now Playing card. -->

                    <!-- Weight Visualization -->
                    <div id="weightVizContainer" class="weight-viz-container">
                        <label class="form-label">Channel Balance</label>
                        <div id="weightViz" class="weight-viz"></div>
                    </div>

                    <!-- Channel List -->
                    <div class="form-group">
                        <label class="form-label">Channels (<span id="channelCount">0</span>/64)</label>
                        <div id="channelList" class="channel-list"></div>
                        <button type="button" class="btn btn-secondary add-channel-btn" onclick="showAddChannelModal()"
                                id="addChannelBtn">+ Add Channel</button>
                    </div>

                    <!-- Action Buttons -->
                    <div class="button-group">
                        <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
                        <button type="button" class="btn btn-primary" id="saveBtn" onclick="savePlayset()">Save</button>
                        <button type="button" class="btn btn-primary" id="saveAndPlayBtn" onclick="saveAndPlay()">Save &amp; Play</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Add Channel Modal -->
    <div id="addChannelModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Add Channel</h3>
                <button class="close-btn" onclick="closeAddChannelModal()">&times;</button>
            </div>

            <div class="form-group">
                <label class="form-label">Channel Type</label>
                <select id="channelType" class="form-input" onchange="updateChannelTypeFields()">
                    <option value="makapix">Makapix Club</option>
                    <option value="giphy">Giphy</option>
                    <option value="klipy">Klipy</option>
                    <option value="institution">Museum</option>
                    <option value="sdcard">Local SD Card</option>
                </select>
            </div>

            <div id="channelTypeFields">
                <!-- Dynamic fields based on channel type -->
            </div>

            <div class="form-group">
                <label class="form-label">Display Name (optional)</label>
                <input type="text" id="channelDisplayName" class="form-input" maxlength="64"
                       placeholder="Custom label for this channel">
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="closeAddChannelModal()">Cancel</button>
                <button class="btn btn-primary" onclick="addChannel()">Add Channel</button>
            </div>
        </div>
    </div>


    <script>
        // Constants
        var PROTECTED_PLAYSETS = ['followed_artists'];
        // Must stay in sync with PLAYSET_MAX_COUNT in
        // components/play_scheduler/include/playset_store.h (the backend's hard cap).
        var MAX_PLAYSETS = 32;

        // State
        var state = {
            playsets: [],
            currentPlayset: null,
            channels: [],
            isEditing: false,
            editingName: null,
            activePlayset: null,
            draggedIndex: null
        };

        var channelTypeLabels = {
            named: 'Named',
            user: 'Artist',
            reactions: 'Artist Reactions',
            hashtag: 'Hashtag',
            sdcard: 'SD Card',
            giphy: 'Giphy',
            klipy: 'Klipy',
            institution: 'Museum'
        };

        var channelColors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];

        // Curated Klipy categories (from the Klipy categories endpoint). Each is
        // both the label and the search query used for a category channel.
        var KLIPY_CATEGORIES = ['hello','lol','love','happy birthday','thank you','excited','yes','no','sorry','happy','sad','thumbs up','scared','bye','confused','angry','hungry','kiss','please','surprised','nervous','embarrassed','ok','congratulations','hugs','good luck','dance','clapping','bored','wink','smile','aww','high five','good morning','youre welcome','good night'];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadPlaysets();
            loadActivePlayset();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Name validation
            document.getElementById('playsetName').addEventListener('input', validateName);
        }

        function validateName() {
            var input = document.getElementById('playsetName');
            var error = document.getElementById('nameError');
            var value = input.value;
            var valid = true;

            if (!value) {
                error.textContent = 'Name is required';
                error.classList.remove('hidden');
                input.classList.add('error');
                valid = false;
            } else if (/[\x00-\x1f]/.test(value)) {
                error.textContent = 'Name must not contain control characters';
                error.classList.remove('hidden');
                input.classList.add('error');
                valid = false;
            } else if (value === 'active') {
                error.textContent = 'The name "active" is reserved';
                error.classList.remove('hidden');
                input.classList.add('error');
                valid = false;
            } else if (isProtectedPlayset(value) && !(state.isEditing && value === state.editingName)) {
                error.textContent = 'This name is reserved and cannot be used';
                error.classList.remove('hidden');
                input.classList.add('error');
                valid = false;
            } else {
                error.classList.add('hidden');
                input.classList.remove('error');
            }

            updateSaveButtons();
            return valid;
        }

        function isProtectedPlayset(name) {
            for (var i = 0; i < PROTECTED_PLAYSETS.length; i++) {
                if (PROTECTED_PLAYSETS[i] === name) return true;
            }
            return false;
        }

        // sanitizeGiphyName removed: Giphy queries now stored verbatim in identifier field

        // API Functions
        function loadActivePlayset() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/playsets/active', true);
            xhr.timeout = 5000;
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var resp = JSON.parse(xhr.responseText);
                        if (resp.ok && resp.data) {
                            state.activePlayset = resp.data.name || null;
                            renderPlaysetList();
                        }
                    } catch (e) {
                        console.log('Failed to parse active playset:', e);
                    }
                }
            };
            xhr.send();
        }

        function loadPlaysets() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/playsets', true);
            xhr.timeout = 10000;
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (xhr.status === 200 && data.ok) {
                            state.playsets = data.data.playsets || [];
                        } else {
                            showToast('Failed to load playsets: ' + (data.error || 'Unknown error'), 'error');
                        }
                    } catch (e) {
                        showToast('Error loading playsets: ' + e.message, 'error');
                    }
                    renderPlaysetList();
                    updateCreateButton();
                }
            };
            xhr.onerror = function() {
                showToast('Network error loading playsets', 'error');
                renderPlaysetList();
            };
            xhr.send();
        }

        function loadPlayset(name) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/playsets/' + encodeURIComponent(name), true);
            xhr.timeout = 10000;
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (xhr.status === 200 && data.ok) {
                            var playset = data.data;
                            state.channels = playset.channels || [];
                            state.isEditing = true;
                            state.editingName = name;

                            document.getElementById('playsetName').value = name;
                            document.getElementById('playsetName').readOnly = false;

                            renderChannels();
                            updateWeightVisualization();

                            showEditorView();
                        } else {
                            showToast('Failed to load playset: ' + (data.error || 'Unknown error'), 'error');
                        }
                    } catch (e) {
                        showToast('Error loading playset: ' + e.message, 'error');
                    }
                }
            };
            xhr.onerror = function() {
                showToast('Network error loading playset', 'error');
            };
            xhr.send();
        }

        function buildPlaysetPayload(activate) {
            var payload = {
                channels: state.channels
            };
            if (activate) {
                payload.activate = true;
            }
            return payload;
        }

        function savePlayset() {
            if (!validateForm()) return;

            var name = document.getElementById('playsetName').value;
            var isRename = state.isEditing && name !== state.editingName;

            // Overwrite confirmation when creating or renaming to existing name
            if ((!state.isEditing || isRename) && playsetExistsInList(name)) {
                if (!confirm('A playset named "' + name + '" already exists. Overwrite it?')) {
                    return;
                }
            }

            var payload = buildPlaysetPayload(false);
            if (isRename) {
                payload.rename_from = state.editingName;
            }

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/playsets/' + encodeURIComponent(name), true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var result = JSON.parse(xhr.responseText);
                        if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                            showToast('Playset saved successfully!', 'success');
                            setTimeout(function() {
                                cancelEdit();
                                loadPlaysets();
                            }, 1000);
                        } else {
                            showToast('Failed to save playset: ' + (result.error || 'Unknown error'), 'error');
                        }
                    } catch (e) {
                        showToast('Error saving playset: ' + e.message, 'error');
                    }
                }
            };
            xhr.onerror = function() {
                showToast('Network error saving playset', 'error');
            };
            xhr.send(JSON.stringify(payload));
        }

        function saveAndPlay() {
            if (!validateForm()) return;

            var name = document.getElementById('playsetName').value;
            var isRename = state.isEditing && name !== state.editingName;

            // Overwrite confirmation when creating or renaming to existing name
            if ((!state.isEditing || isRename) && playsetExistsInList(name)) {
                if (!confirm('A playset named "' + name + '" already exists. Overwrite it?')) {
                    return;
                }
            }

            var payload = buildPlaysetPayload(true);
            if (isRename) {
                payload.rename_from = state.editingName;
            }

            var saveBtn = document.getElementById('saveBtn');
            var saveAndPlayBtn = document.getElementById('saveAndPlayBtn');
            saveAndPlayBtn.classList.add('pending');
            saveBtn.disabled = true;
            var clearPending = function() {
                saveAndPlayBtn.classList.remove('pending');
                updateSaveButtons();
            };

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/playsets/' + encodeURIComponent(name), true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var result = JSON.parse(xhr.responseText);
                        if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                            clearPending();
                            // activated:true now means the switch was accepted
                            // and runs in the background on the device.
                            showToast('Playset saved! Switching…', 'success');
                            state.activePlayset = name;
                            cancelEdit();
                            loadPlaysets();
                        } else {
                            clearPending();
                            showToast('Failed to save playset: ' + (result.error || 'Unknown error'), 'error');
                        }
                    } catch (e) {
                        clearPending();
                        showToast('Error: ' + e.message, 'error');
                    }
                }
            };
            xhr.onerror = function() {
                clearPending();
                showToast('Network error saving playset', 'error');
            };
            xhr.send(JSON.stringify(payload));
        }

        function deletePlayset(name) {
            if (isProtectedPlayset(name)) {
                showToast('Cannot delete protected playset', 'error');
                return;
            }
            if (!confirm('Delete playset "' + name + '"?')) return;

            var xhr = new XMLHttpRequest();
            xhr.open('DELETE', '/playsets/' + encodeURIComponent(name), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var result = JSON.parse(xhr.responseText);
                        if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                            showToast('Playset deleted', 'success');
                            if (state.activePlayset === name) {
                                state.activePlayset = null;
                            }
                            loadPlaysets();
                        } else {
                            showToast('Failed to delete: ' + (result.error || 'Unknown error'), 'error');
                        }
                    } catch (e) {
                        showToast('Error deleting playset: ' + e.message, 'error');
                    }
                }
            };
            xhr.onerror = function() {
                showToast('Network error deleting playset', 'error');
            };
            xhr.send();
        }

        function playPlayset(name, btn) {
            var pendingRow = btn && btn.closest ? btn.closest('.playset-item') : null;
            document.querySelectorAll('.playset-item.pending').forEach(function(r) {
                r.classList.remove('pending');
            });
            if (pendingRow) pendingRow.classList.add('pending');

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/playset/' + encodeURIComponent(name), true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var result = JSON.parse(xhr.responseText);
                        if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                            // Accepted: the device switches in the background.
                            showToast('Switching to "' + name + '"…', 'success');
                            state.activePlayset = name;
                            renderPlaysetList();
                        } else {
                            if (pendingRow) pendingRow.classList.remove('pending');
                            showToast('Failed to play: ' + (result.error || 'Unknown error'), 'error');
                        }
                    } catch (e) {
                        if (pendingRow) pendingRow.classList.remove('pending');
                        showToast('Error playing playset: ' + e.message, 'error');
                    }
                }
            };
            xhr.onerror = function() {
                if (pendingRow) pendingRow.classList.remove('pending');
                showToast('Network error playing playset', 'error');
            };
            xhr.send('{}');
        }

        function playsetExistsInList(name) {
            for (var i = 0; i < state.playsets.length; i++) {
                if (state.playsets[i].name === name) return true;
            }
            return false;
        }

        function validateForm() {
            if (!validateName()) return false;

            if (state.channels.length === 0) {
                showToast('Add at least one channel', 'error');
                return false;
            }

            if (state.channels.length > 64) {
                showToast('Maximum 64 channels allowed', 'error');
                return false;
            }

            return true;
        }

        function updateSaveButtons() {
            var saveBtn = document.getElementById('saveBtn');
            var saveAndPlayBtn = document.getElementById('saveAndPlayBtn');
            if (!saveBtn || !saveAndPlayBtn) return;

            var name = document.getElementById('playsetName').value;
            var disabled = false;

            if (state.channels.length === 0) {
                disabled = true;
            } else if (!name) {
                disabled = true;
            } else if (name === 'active') {
                disabled = true;
            } else if (isProtectedPlayset(name) && !(state.isEditing && name === state.editingName)) {
                disabled = true;
            }

            saveBtn.disabled = disabled;
            saveAndPlayBtn.disabled = disabled;
        }

        function updateCreateButton() {
            var btn = document.getElementById('createNewBtn');
            if (btn) {
                btn.disabled = state.playsets.length >= MAX_PLAYSETS;
                if (state.playsets.length >= MAX_PLAYSETS) {
                    btn.title = 'Maximum of ' + MAX_PLAYSETS + ' playsets reached';
                } else {
                    btn.title = '';
                }
            }
        }

        // View Functions
        function showEditorView() {
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('editorView').classList.remove('hidden');
        }

        function showListView() {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('editorView').classList.add('hidden');
        }

        function showEditor() {
            if (state.playsets.length >= MAX_PLAYSETS) {
                showToast('Maximum of ' + MAX_PLAYSETS + ' playsets reached', 'error');
                return;
            }

            state.channels = [];
            state.isEditing = false;
            state.editingName = null;

            document.getElementById('playsetName').value = '';
            document.getElementById('playsetName').readOnly = false;

            renderChannels();
            updateWeightVisualization();
            updateSaveButtons();
            showEditorView();
        }

        function cancelEdit() {
            showListView();
        }

        function renderPlaysetList() {
            var list = document.getElementById('playsetList');

            var visible = [];
            for (var i = 0; i < state.playsets.length; i++) {
                if (!isProtectedPlayset(state.playsets[i].name)) {
                    visible.push(state.playsets[i]);
                }
            }

            if (visible.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#127925;</div><p>No playsets yet. Create your first mix!</p></div>';
                updateCreateButton();
                return;
            }

            var html = '';
            for (var i = 0; i < visible.length; i++) {
                var p = visible[i];
                var isActive = state.activePlayset && state.activePlayset === p.name;

                html += '<div class="playset-item' + (isActive ? ' active-playset' : '') + '">' +
                    '<div class="playset-info">' +
                    '<div class="playset-name">' + escapeHtml(p.name) +
                    (isActive ? ' <span class="now-playing-badge">Now Playing</span>' : '') +
                    '</div>' +
                    '<div class="playset-meta">' +

                    '</div>' +
                    '</div>' +

                    '<button class="btn btn-secondary btn-small" onclick="loadPlayset(\'' + escapeAttr(p.name) + '\')">Edit</button>' +
                    '<button class="btn btn-danger" onclick="deletePlayset(\'' + escapeAttr(p.name) + '\')">Delete</button>' +
                    '</div>' +

        function updateWeightVisualization() {
            var viz = document.getElementById('weightViz');
            var total = 0;

            for (var i = 0; i < state.channels.length; i++) {
                var weight = parseInt(state.channels[i].weight) || 0;
                if (weight === 0) weight = 100;
                total += weight;
            }

            if (total === 0) {
                viz.innerHTML = '<div style="padding: 10px; text-align: center; color: var(--c-card-fg-muted);">Add weights to see balance</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < state.channels.length; i++) {
                var channel = state.channels[i];
                var weight = parseInt(channel.weight) || 100;
                var percent = (weight / total * 100);
                var displayName = channel.display_name || getDefaultChannelName(channel);
                var color = channelColors[i % channelColors.length];

                if (percent >= 5) {
                    html += '<div class="weight-bar" style="width: ' + percent + '%; background: ' + color + '" ' +
                        'title="' + escapeAttr(displayName) + ': ' + Math.round(percent) + '%">' +
                        (percent >= 10 ? Math.round(percent) + '%' : '') +
                        '</div>';
                }
            }

            viz.innerHTML = html;
        }

        function renderChannels() {
            var list = document.getElementById('channelList');

            document.getElementById('channelCount').textContent = state.channels.length;
            document.getElementById('addChannelBtn').disabled = state.channels.length >= 64;

            if (state.channels.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No channels yet</p></div>';
                updateWeightVisualization();
                updateSaveButtons();
                return;
            }

            var html = '';
            for (var i = 0; i < state.channels.length; i++) {
                html += renderChannelCard(i);
            }
            list.innerHTML = html;

            updateWeightVisualization();
            updateSaveButtons();
        }

                'ondragstart="handleDragStart(event, ' + index + ')" ' +
                'ondragover="handleDragOver(event)" ' +
                'ondrop="handleDrop(event, ' + index + ')" ' +
                'ondragenter="handleDragEnter(event)" ' +
                'ondragleave="handleDragLeave(event)" ' +
                'ondragend="handleDragEnd(event)">' +
                '<div class="channel-header">' +
                '<div class="channel-header-left">' +

                                   channel.type === 'giphy' ||

        function getDefaultChannelName(channel) {
            switch (channel.type) {
                case 'named':
                    return channel.name === 'all' ? 'All Artworks' : 'Promoted Artworks';
                case 'user':
                    return 'Artist: ' + (channel.identifier || 'unknown');
                case 'reactions':
                    return 'Reactions: ' + (channel.identifier || 'unknown');
                case 'hashtag':
                    return '#' + (channel.identifier || 'tag');
                case 'sdcard':
                    return 'SD Card';
                case 'giphy':
                    if (channel.name === 'trending') return 'Giphy Trending';
                    if (channel.name === 'search' && channel.identifier) {
                        return 'Giphy: ' + channel.identifier;
                    }
                    return 'Giphy';
                case 'klipy': {
                    var kp = (channel.name || '').split(':');
                    var kprod = kp[0] === 'sticker' ? 'Klipy Stickers' : 'Klipy';
                    var kmode = kp[1] || 'trending';
                    if ((kmode === 'search' || kmode === 'category') && channel.identifier) {
                        return kprod + ': ' + channel.identifier;
                    }
                    return kprod + ' Trending';
                }
                default:
                    return channel.type;
            }
        }

        function isValidHashtag(value) {
            var v = (value || '').trim();
            return v.length > 0 && v.length <= 64 && !/\s/.test(v);

        var verifyCooldownUntil = 0;
        var VERIFY_COOLDOWN_MS = 5000;

        function buildVaultUrl(url) {
            if (!url) return '';
            return url.charAt(0) === '/' ? 'https://makapix.club' + url : url;
        }

        function formatCount(n, capped, noun) {
            if (!n) return 'No ' + noun + ' yet';
            if (capped) return '100+ ' + noun;
            return n + ' ' + noun;
        }

        function setDisplayName(displayNameTarget, channelIndex, name) {
            if (displayNameTarget && typeof displayNameTarget === 'string') {
                var dnInput = document.getElementById(displayNameTarget);
                if (dnInput) dnInput.value = name;
            } else if (channelIndex !== null && channelIndex !== undefined) {
                var dnCard = document.getElementById('displayName_' + channelIndex);
                if (dnCard) dnCard.value = name;
                if (state.channels[channelIndex]) {
                    state.channels[channelIndex].display_name = name;
                }
            }
        }

        function runVerify(config) {
            var el = document.getElementById(config.resultsId);
            if (!el) return;
            var input = (config.input || '').trim();

            if (!config.isValid(input)) {
                el.className = 'check-results';
                el.innerHTML = config.placeholder;
                return;
            }

            var now = Date.now();
            if (now < verifyCooldownUntil) {
                var wait = Math.ceil((verifyCooldownUntil - now) / 1000);
                el.className = 'check-results';
                el.innerHTML = 'Rate limited &mdash; wait ' + wait + 's.';
                return;
            }

            el.className = 'check-results';
            el.innerHTML = 'Querying Makapix Club...';

            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://makapix.club' + config.endpoint + encodeURIComponent(input), true);
            xhr.onload = function() {
                if (xhr.status === 404) {
                    el.className = 'check-results';
                    el.innerHTML = config.notFoundMessage;
                    return;
                }
                if (xhr.status === 429) {
                    verifyCooldownUntil = Date.now() + VERIFY_COOLDOWN_MS;
                    el.className = 'check-results';
                    el.innerHTML = 'Rate limited &mdash; wait ' + Math.ceil(VERIFY_COOLDOWN_MS / 1000) + 's.';
                    return;
                }
                if (xhr.status !== 200) {
                    el.className = 'check-results';
                    el.innerHTML = 'Error (HTTP ' + xhr.status + ').';
                    return;
                }
                try {
                    var data = JSON.parse(xhr.responseText);
                    config.renderSuccess(el, data);
                } catch (e) {
                    el.className = 'check-results';
                    el.innerHTML = 'Invalid response.';
                }
            };
            xhr.onerror = function() {
                el.className = 'check-results';
                el.innerHTML = 'Network error.';
            };
            xhr.send();
        }

        function verifyUser(sqid, resultsId, displayNameTarget, channelIndex) {
            runVerify({
                input: sqid,
                isValid: isValidSqid,
                placeholder: 'Enter sqid to check.',
                endpoint: '/api/player/verify-user/',
                notFoundMessage: 'User not found.',
                resultsId: resultsId,
                renderSuccess: function(el, data) {
                    var handle = data.handle || sqid;
                    var avatarUrl = buildVaultUrl(data.avatar_url);
                    var avatarHtml = avatarUrl ?
                        '<img class="avatar" src="' + escapeAttr(avatarUrl) + '" alt="avatar">' : '';
                    var rep = data.reputation !== undefined ? data.reputation : '?';
                    var artworks = data.artwork_count !== undefined ? data.artwork_count : '?';
                    el.className = 'check-results has-data';
                    el.innerHTML = avatarHtml +
                        '<div class="user-info"><strong>' + escapeAttr(handle) + '</strong><br>' +
                        'Rep: ' + escapeAttr(String(rep)) + ' &middot; Artworks: ' + escapeAttr(String(artworks)) + '</div>';
                    setDisplayName(displayNameTarget, channelIndex, handle);
                }
            });
        }

        function verifyReactions(sqid, resultsId, displayNameTarget, channelIndex) {
            runVerify({
                input: sqid,
                isValid: isValidSqid,
                placeholder: 'Enter sqid to check.',
                endpoint: '/api/player/verify-reactions/',
                notFoundMessage: 'User not found.',
                resultsId: resultsId,
                renderSuccess: function(el, data) {
                    var handle = data.handle || sqid;
                    var thumbUrl = buildVaultUrl(data.latest_artwork_url);
                    var thumbHtml = thumbUrl ?
                        '<img class="avatar" src="' + escapeAttr(thumbUrl) + '" alt="preview">' : '';
                    var count = formatCount(data.artwork_count || 0, !!data.artwork_count_capped, 'reactions');
                    el.className = 'check-results has-data';
                    el.innerHTML = thumbHtml +
                        '<div class="user-info"><strong>' + escapeAttr(handle) + '</strong><br>' +
                        escapeAttr(count) + '</div>';
                    setDisplayName(displayNameTarget, channelIndex, handle + "'s reactions");
                }
            });
        }

        function verifyHashtag(tag, resultsId, displayNameTarget, channelIndex) {
            runVerify({
                input: tag,
                isValid: isValidHashtag,
                placeholder: 'Enter hashtag to check.',
                endpoint: '/api/player/verify-hashtag/',
                notFoundMessage: 'Hashtag not found.',
                resultsId: resultsId,
                renderSuccess: function(el, data) {
                    var normalizedTag = data.tag || (tag || '').trim();
                    var thumbUrl = buildVaultUrl(data.latest_artwork_url);
                    var thumbHtml = thumbUrl ?
                        '<img class="avatar" src="' + escapeAttr(thumbUrl) + '" alt="preview">' : '';
                    var count = formatCount(data.artwork_count || 0, !!data.artwork_count_capped, 'artworks');
                    el.className = 'check-results has-data';
                    el.innerHTML = thumbHtml +
                        '<div class="user-info"><strong>#' + escapeAttr(normalizedTag) + '</strong><br>' +
                        escapeAttr(count) + '</div>';
                    setDisplayName(displayNameTarget, channelIndex, '#' + normalizedTag);
                }
            });
        }

        function verifyArtist(sqid, resultsId, displayNameTarget, channelIndex) {
            var isReactions;
            if (channelIndex !== null && channelIndex !== undefined) {
                isReactions = !!(state.channels[channelIndex] &&
                                 state.channels[channelIndex].type === 'reactions');
            } else {
                var kindSel = document.getElementById('makapixKind');
                isReactions = !!(kindSel && kindSel.value === 'reactions');
            }
            if (isReactions) {
                verifyReactions(sqid, resultsId, displayNameTarget, channelIndex);
            } else {
                verifyUser(sqid, resultsId, displayNameTarget, channelIndex);
            }
        }

        function handleGiphyModeChange(index, mode) {
            if (mode === 'trending') {
                state.channels[index].name = 'trending';
                state.channels[index].identifier = '';
            } else {
                state.channels[index].name = 'search';
                state.channels[index].identifier = '';
            }
            renderChannels();
        }

        function updateGiphySearch(index, query) {
            state.channels[index].identifier = query;
        }

        function removeChannel(index) {
            state.channels.splice(index, 1);
            renderChannels();
        }

        function moveChannel(index, direction) {
            var newIndex = index + direction;
            if (newIndex < 0 || newIndex >= state.channels.length) return;

            var temp = state.channels[index];
            state.channels[index] = state.channels[newIndex];
            state.channels[newIndex] = temp;

            renderChannels();
        }

        // Drag and Drop
        function handleDragStart(event, index) {
            state.draggedIndex = index;
            event.currentTarget.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(event) {
            if (event.preventDefault) {
                event.preventDefault();
            }
            event.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(event) {
            event.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(event, dropIndex) {
            if (event.stopPropagation) {
                event.stopPropagation();
            }
            event.preventDefault();

            event.currentTarget.classList.remove('drag-over');

            if (state.draggedIndex !== null && state.draggedIndex !== dropIndex) {
                var draggedChannel = state.channels[state.draggedIndex];
                state.channels.splice(state.draggedIndex, 1);
                state.channels.splice(dropIndex, 0, draggedChannel);
                renderChannels();
            }

            return false;
        }

        function handleDragEnd(event) {
            event.currentTarget.classList.remove('dragging');
            state.draggedIndex = null;

            var cards = document.querySelectorAll('.channel-card');
            for (var i = 0; i < cards.length; i++) {
                cards[i].classList.remove('drag-over');
            }
        }

        // Add Channel Modal
        function showAddChannelModal() {
            if (state.channels.length >= 64) {
                showToast('Maximum 64 channels allowed', 'error');
                return;
            }

            document.getElementById('channelType').value = 'makapix';
            document.getElementById('channelDisplayName').value = '';
            updateChannelTypeFields();
            document.getElementById('addChannelModal').classList.add('active');
        }

        function closeAddChannelModal() {
            document.getElementById('addChannelModal').classList.remove('active');
        }

        function updateChannelTypeFields() {
            var type = document.getElementById('channelType').value;
            var container = document.getElementById('channelTypeFields');
            var html = '';

            switch (type) {
                case 'makapix':
                    html = '<div class="form-group">' +
                        '<label class="form-label">Makapix Channel</label>' +
                        '<select id="makapixKind" class="form-input" onchange="updateMakapixKindFields()">' +
                        '<option value="named">Feed</option>' +
                        '<option value="user">Artist</option>' +
                        '<option value="reactions">Artist Reactions</option>' +
                        '<option value="hashtag">Hashtag</option>' +
                        '</select>' +
                        '</div>' +
                        '<div id="makapixKindFields"></div>';
                    break;

                case 'sdcard':
                    var hasSDCard = false;
                    for (var i = 0; i < state.channels.length; i++) {
                        if (state.channels[i].type === 'sdcard') {
                            hasSDCard = true;
                            break;
                        }
                    }
                    if (hasSDCard) {
                        html = '<div class="mode-description" style="margin-top: 0;">SD Card channel already added</div>';
                    } else {
                        html = '<div class="mode-description" style="margin-top: 0;">Plays local files from the device SD card</div>';
                    }
                    break;

                case 'giphy':
                    html = '<div class="form-group">' +
                        '<label class="form-label">Giphy Mode</label>' +
                        '<select id="giphyMode" class="form-input" onchange="updateGiphyFields()">' +
                        '<option value="trending">Trending</option>' +
                        '<option value="search">Search</option>' +
                        '</select>' +
                        '</div>' +
                        '<div id="giphySearchField" class="form-group hidden">' +
                        '<label class="form-label">Search Query</label>' +
                        '<input type="text" id="giphySearch" class="form-input" placeholder="cats" maxlength="32">' +
                        '</div>';
                    break;

                case 'klipy':
                    html = '<div class="form-group">' +
                        '<label class="form-label">Klipy Product</label>' +
                        '<select id="klipyProduct" class="form-input">' +
                        '<option value="gif">GIFs</option>' +
                        '<option value="sticker">Stickers</option>' +
                        '</select>' +
                        '</div>' +
                        '<div class="form-group">' +
                        '<label class="form-label">Klipy Mode</label>' +
                        '<select id="klipyMode" class="form-input" onchange="updateKlipyFields()">' +
                        '<option value="trending">Trending</option>' +
                        '<option value="search">Search</option>' +
                        '<option value="category">Category</option>' +
                        '</select>' +
                        '</div>' +
                        '<div id="klipySearchField" class="form-group hidden">' +
                        '<label class="form-label">Search Query</label>' +
                        '<input type="text" id="klipySearch" class="form-input" placeholder="cats" maxlength="32">' +
                        '</div>' +
                        '<div id="klipyCategoryField" class="form-group hidden">' +
                        '<label class="form-label">Category</label>' +
                        '<select id="klipyCategory" class="form-input">' +
                        KLIPY_CATEGORIES.map(function(c){ return '<option value="' + escapeAttr(c) + '">' + escapeHtml(c) + '</option>'; }).join('') +
                        '</select>' +
                        '</div>';
                    break;

                case 'institution':
                    // Museum picks happen through a dedicated four-step modal
                    // (museum -> axis -> term -> preview) defined in
                    // /museum/browse.js. The Add Channel modal stays open in
                    // the background while the user navigates; the browse
                    // modal closes both modals on confirm.
                    html = '<div class="mode-description" style="margin-top: 0;">' +
                        'Opening museum browser…' +
                        '</div>';
                    // Defer so the dropdown click handler returns before
                    // we mount another modal on top.
                    setTimeout(openMuseumBrowseFromEditor, 0);
                    break;
            }

            container.innerHTML = html;

            if (type === 'makapix') {
                updateMakapixKindFields();
            }
        }

        function updateMakapixKindFields() {
            var kind = document.getElementById('makapixKind').value;
            var container = document.getElementById('makapixKindFields');
            var html = '';

            switch (kind) {
                case 'named':
                    html = '<div class="form-group">' +
                        '<label class="form-label">Channel</label>' +
                        '<select id="namedChannelValue" class="form-input">' +
                        '<option value="all">All Artworks</option>' +
                        '<option value="promoted">Promoted Artworks</option>' +
                        '</select>' +
                        '</div>';
                    break;

                case 'user':
                case 'reactions':
                    html = '<div class="form-group">' +
                        '<label class="form-label">Artist ID (sqid)</label>' +
                        '<div class="sqid-input-row">' +
                        '<input type="text" id="userIdentifier" class="form-input" placeholder="artist_sqid" maxlength="32" ' +
                        'oninput="updateModalCheckButton()">' +
                        '<button type="button" class="btn btn-secondary btn-small" id="modalCheckBtn" ' +
                        'onclick="verifyArtist(document.getElementById(\'userIdentifier\').value, \'modalCheckResults\', \'channelDisplayName\', null)" disabled>Check</button>' +
                        '</div>' +
                        '<div class="check-results" id="modalCheckResults">Enter sqid to check.</div>' +
                        '</div>';
                    break;

                case 'hashtag':
                    html = '<div class="form-group">' +
                        '<label class="form-label">Hashtag (without #)</label>' +
                        '<div class="sqid-input-row">' +
                        '<input type="text" id="hashtagIdentifier" class="form-input" placeholder="pixelart" maxlength="64" ' +
                        'oninput="updateModalHashtagCheckButton()">' +
                        '<button type="button" class="btn btn-secondary btn-small" id="modalHashtagCheckBtn" ' +
                        'onclick="verifyHashtag(document.getElementById(\'hashtagIdentifier\').value, \'modalHashtagResults\', \'channelDisplayName\', null)" disabled>Check</button>' +
                        '</div>' +
                        '<div class="check-results" id="modalHashtagResults">Enter hashtag to check.</div>' +
                        '</div>';
                    break;
            }

            container.innerHTML = html;
        }

        // Bridge to the ES-module museum browser. Populated by the
        // <script type="module"> block below on page load.
        function openMuseumBrowseFromEditor() {
            if (typeof window.__museumBrowseOpen !== 'function') {
                showToast('Museum browser still loading', 'error');
                return;
            }
            window.__museumBrowseOpen({
                onAdd: function(spec) {
                    if (state.channels.length >= 64) {
                        showToast('Maximum 64 channels allowed', 'error');
                        return;
                    }
                    var override = document.getElementById('channelDisplayName').value.trim();
                    if (override) spec.display_name = override;
                    state.channels.push(spec);
                    renderChannels();
                    closeAddChannelModal();
                    showToast('Museum channel added', 'success');
                },
                onCancel: function() {
                    // User backed out of the browse modal. Revert the type
                    // dropdown to a sane default so the Add Channel modal
                    // doesn't keep re-triggering the browser on reopen.
                    document.getElementById('channelType').value = 'makapix';
                    updateChannelTypeFields();
                }
            });
        }

        function updateGiphyFields() {
            var mode = document.getElementById('giphyMode').value;
            var searchField = document.getElementById('giphySearchField');
            if (mode === 'search') {
                searchField.classList.remove('hidden');
            } else {
                searchField.classList.add('hidden');
            }
        }

        function updateKlipyFields() {
            var mode = document.getElementById('klipyMode').value;
            document.getElementById('klipySearchField').classList.toggle('hidden', mode !== 'search');
            document.getElementById('klipyCategoryField').classList.toggle('hidden', mode !== 'category');
        }

        function addChannel() {
            var type = document.getElementById('channelType').value;
            if (type === 'makapix') {
                // The UI groups the four Makapix kinds under one "Makapix
                // Club" entry, but the stored channel type stays the kind.
                type = document.getElementById('makapixKind').value;
            }
            var displayName = document.getElementById('channelDisplayName').value.trim();

            var channel = {
                type: type,
                name: '',
                identifier: '',
                display_name: displayName,
                weight: 100,
                offset: 0
            };

            switch (type) {
                case 'named':
                    channel.name = document.getElementById('namedChannelValue').value;
                    break;

                case 'user':
                    channel.name = 'user';
                    channel.identifier = document.getElementById('userIdentifier').value.trim();
                    if (!channel.identifier) {
                        showToast('Please enter an artist ID', 'error');
                        return;
                    }
                    break;

                case 'reactions':
                    channel.name = 'reactions';
                    channel.identifier = document.getElementById('userIdentifier').value.trim();
                    if (!channel.identifier) {
                        showToast('Please enter an artist ID', 'error');
                        return;
                    }
                    break;

                case 'hashtag':
                    channel.name = 'hashtag';
                    channel.identifier = document.getElementById('hashtagIdentifier').value.trim();
                    if (!channel.identifier) {
                        showToast('Please enter a hashtag', 'error');
                        return;
                    }
                    break;

                case 'sdcard':
                    for (var i = 0; i < state.channels.length; i++) {
                        if (state.channels[i].type === 'sdcard') {
                            showToast('SD Card channel already added', 'error');
                            return;
                        }
                    }
                    channel.name = 'sdcard';
                    break;

                case 'giphy':
                    var giphyMode = document.getElementById('giphyMode').value;
                    if (giphyMode === 'trending') {
                        channel.name = 'trending';
                    } else {
                        var query = document.getElementById('giphySearch').value.trim();
                        if (!query) {
                            showToast('Please enter a search query', 'error');
                            return;
                        }
                        channel.name = 'search';
                        channel.identifier = query;
                    }
                    break;

                case 'klipy':
                    var klipyProduct = document.getElementById('klipyProduct').value;
                    var klipyMode = document.getElementById('klipyMode').value;
                    channel.name = klipyProduct + ':' + klipyMode;
                    if (klipyMode === 'search') {
                        var kquery = document.getElementById('klipySearch').value.trim();
                        if (!kquery) {
                            showToast('Please enter a search query', 'error');
                            return;
                        }
                        channel.identifier = kquery;
                    } else if (klipyMode === 'category') {
                        channel.identifier = document.getElementById('klipyCategory').value;
                    }
                    break;

                case 'institution':
                    // The browse modal pushes the channel directly via
                    // its onAdd callback, so clicking the editor's Add
                    // Channel button while type=Museum has no path to
                    // produce a valid spec. Bail with a hint instead of
                    // generating an empty channel.
                    showToast('Use the museum browser to pick a term first', 'error');
                    return;
            }

            state.channels.push(channel);
            renderChannels();
            closeAddChannelModal();
            showToast('Channel added', 'success');
        }

        function showToast() {}

        // Utilities
        function capitalize(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/'/g, '&#39;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
    </script>
    <!-- Museum browse modal lives in /museum/*.js as ES modules. The
         editor's classic <script> above can't `import`, so we mount the
         entry point onto window.__museumBrowseOpen here. -->
    <script type="module">
        import { openMuseumBrowse } from '/museum/browse.js';
        window.__museumBrowseOpen = openMuseumBrowse;
    </script>
