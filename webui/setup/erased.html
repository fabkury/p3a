<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>p3a - Reset Wi-Fi</title>
<style>
* { box-sizing: border-box; }
:root {
  --c-bg: #0E0A1A;
  --c-on-bg: #EDE9F5;
  --c-on-bg-muted: #A89FC0;
  --c-card-bg: #171229;
  --c-card-fg: #EDE9F5;
  --c-card-fg-muted: #A89FC0;
  --c-card-border: #2E2547;
  --c-card-shadow: 0 6px 20px rgba(0,0,0,0.5);
  --c-primary: #8B5CFF;
  --c-on-primary: #FFFFFF;
  --r-md: 12px;
  --r-lg: 18px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-display: ui-monospace, 'Cascadia Mono', 'Segoe UI Mono', Consolas, monospace;
}
body {
  margin: 0;
  padding: 12px 10px 16px;
  font-family: var(--font);
  background-color: var(--c-bg);
  background-image:
    radial-gradient(110% 55% at 50% -8%, rgba(139,92,255,0.20), transparent 60%),
    radial-gradient(90% 50% at 100% 110%, rgba(255,77,151,0.12), transparent 55%);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: var(--c-on-bg);
}
@supports (min-height: 100svh) { body { min-height: 100svh; } }
@supports (min-height: 100dvh) { body { min-height: 100dvh; } }
.header { text-align: center; padding: 8px 0 4px; }
.header h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 2.4rem);
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: lowercase;
  background: conic-gradient(from 0deg,
      #FF4D4D, #FF8A33, #FFC533, #42D86E, #2BD6D6, #33A6FF, #8B5CFF, #E84DD6, #FF4D4D);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
}
.subtitle { margin: 0; color: var(--c-on-bg-muted); font-size: 0.95rem; }
.card {
  width: min(520px, 100%);
  background: var(--c-card-bg);
  border: 1px solid var(--c-card-border);
  border-radius: var(--r-lg);
  padding: 16px;
  box-shadow: var(--c-card-shadow);
  color: var(--c-card-fg);
}
.card h2 {
  margin: 0 0 10px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--c-card-fg);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn {
  width: 100%;
  background: var(--c-primary);
  color: var(--c-on-primary);
  padding: 13px 14px;
  border: none;
  border-radius: var(--r-md);
  font-size: 0.98rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-ghost {
  background: rgba(139,92,255,0.14);
  color: #C9B8FF;
  border: 1px solid rgba(139,92,255,0.35);
}
.help { margin: 10px 0 0; font-size: 0.85rem; color: var(--c-card-fg-muted); line-height: 1.35; }
.help code { background: rgba(139,92,255,0.16); color: #D9CCFF; padding: 2px 6px; border-radius: 8px; }
.divider { height: 1px; background: var(--c-card-border); margin: 12px 0; }
.pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(139,92,255,0.18); border: 1px solid rgba(139,92,255,0.32); color: #D9CCFF; font-weight: 600; }
.list { margin: 10px 0 0; padding-left: 18px; color: var(--c-card-fg-muted); }
.list li { margin: 6px 0; }
</style>
</head>
<body>
  <div class="header">
    <h1>p3a</h1>
    <p class="subtitle">resetting wi-fi</p>
  </div>
  <div class="card">
    <h2>Wi-Fi erased. Rebooting now</h2>
    <p class="help">Saved Wi-Fi credentials have been erased. p3a will reboot into setup mode and create the <code>p3a-setup</code> Wi-Fi network again.</p>
    <ul class="list">
      <li>After reboot, connect to <code>p3a-setup</code>.</li>
      <li>Then open <code>http://p3a.local/</code> to set up Wi-Fi.</li>
    </ul>
    <div class="divider"></div>
    <p class="help">This page will auto-reload in <span class="pill"><span id="sec">10</span>s</span>.</p>
    <button class="btn btn-ghost" type="button" onclick="window.location.reload();">Reload now</button>
  </div>
  <script>
  (function(){
    var remaining = 10;
    var el = document.getElementById('sec');
    function tick(){
      remaining--;
      if (el) el.textContent = String(remaining);
      if (remaining <= 0){ clearInterval(timer); window.location.reload(); }
    }
    var timer = setInterval(tick, 1000);
  })();
  </script>
</body>
</html>
