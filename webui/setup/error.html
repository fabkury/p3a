<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>p3a - Wi-Fi Setup</title>
<style>
* { box-sizing: border-box; }
:root {
  --c-bg: #0E0A1A;
  --c-on-bg: #EDE9F5;
  --c-on-bg-muted: #A89FC0;
  --c-card-bg: #171229;
  --c-card-fg: #EDE9F5;
  --c-card-fg-muted: #A89FC0;
  --c-card-border: #2E2547;
  --c-card-shadow: 0 6px 20px rgba(0,0,0,0.5);
  --c-primary: #8B5CFF;
  --c-primary-dark: #7340E0;
  --c-on-primary: #FFFFFF;
  --r-md: 12px;
  --r-lg: 18px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-display: ui-monospace, 'Cascadia Mono', 'Segoe UI Mono', Consolas, monospace;
}
body {
  margin: 0;
  padding: 12px 10px 16px;
  font-family: var(--font);
  background-color: var(--c-bg);
  background-image:
    radial-gradient(110% 55% at 50% -8%, rgba(139,92,255,0.20), transparent 60%),
    radial-gradient(90% 50% at 100% 110%, rgba(255,77,151,0.12), transparent 55%);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: var(--c-on-bg);
}
@supports (min-height: 100svh) { body { min-height: 100svh; } }
@supports (min-height: 100dvh) { body { min-height: 100dvh; } }
.header { text-align: center; padding: 8px 0 4px; }
.header h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 2.4rem);
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: lowercase;
  background: conic-gradient(from 0deg,
      #FF4D4D, #FF8A33, #FFC533, #42D86E, #2BD6D6, #33A6FF, #8B5CFF, #E84DD6, #FF4D4D);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
}
.subtitle { margin: 0; color: var(--c-on-bg-muted); font-size: 0.95rem; }
.card {
  width: min(520px, 100%);
  background: var(--c-card-bg);
  border: 1px solid var(--c-card-border);
  border-radius: var(--r-lg);
  padding: 16px;
  box-shadow: var(--c-card-shadow);
  color: var(--c-card-fg);
}
.card h2 {
  margin: 0 0 10px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--c-card-fg);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn {
  width: 100%;
  background: var(--c-primary);
  color: var(--c-on-primary);
  padding: 13px 14px;
  border: none;
  border-radius: var(--r-md);
  font-size: 0.98rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); background: var(--c-primary-dark); }
.help { margin: 10px 0 0; font-size: 0.85rem; color: var(--c-card-fg-muted); line-height: 1.35; }
.divider { height: 1px; background: var(--c-card-border); margin: 12px 0; }
</style>
</head>
<body>
  <div class="header">
    <h1>p3a</h1>
    <p class="subtitle">wi-fi setup</p>
  </div>
  <div class="card">
    <h2>SSID required</h2>
    <p class="help">Please enter a network name (SSID) and try again.</p>
    <div class="divider"></div>
    <button class="btn" type="button" onclick="window.location.href='/';">Back</button>
  </div>
</body>
</html>
